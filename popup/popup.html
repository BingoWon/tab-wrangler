<!DOCTYPE html>
<html>
<head>
	<title>Tab Wrangler</title>

	<link rel="stylesheet" type="text/css" href="popup.css">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
	<div class="container">
		<header>
			<h1>Tab Wrangler</h1>
			<p class="subtitle">Manage your tabs efficiently</p>
		</header>

		<main>
			<form id="options-form">
				<!-- 功能1: 重复标签页关闭器 -->
				<div class="feature-card">
					<div class="feature-header">
						<h2>Duplicate Tab Closer</h2>
						<label class="switch">
							<input type="checkbox" id="enable_duplicate_tab_closer" name="enable_duplicate_tab_closer" checked>
							<span class="slider round"></span>
						</label>
					</div>
					<p class="feature-description">Close duplicate tabs and focus on existing ones</p>
					
					<div class="feature-options">
						<div class="option-item">
							<label for="option_ignore_hash">
								<span class="option-label">Ignore hash in URL</span>
								<input type="checkbox" id="option_ignore_hash" name="ignore_hash" class="toggle-checkbox">
								<span class="toggle-switch"></span>
							</label>
						</div>
						
						<div class="option-item sub-option" id="replace_hash_container">
							<label for="option_replace_hash">
								<span class="option-label">Replace hash with new one</span>
								<input type="checkbox" id="option_replace_hash" name="replace_hash_for_old_tab" class="toggle-checkbox">
								<span class="toggle-switch"></span>
							</label>
						</div>
						
						<div class="option-item">
							<label for="option_move_tab">
								<span class="option-label">Move tab to new position</span>
								<input type="checkbox" id="option_move_tab" name="move_tab" class="toggle-checkbox">
								<span class="toggle-switch"></span>
							</label>
						</div>
					</div>
				</div>
				
				<!-- 功能2: 返回上一个标签页 -->
				<div class="feature-card">
					<div class="feature-header">
						<h2>Back to Last Tab</h2>
						<label class="switch">
							<input type="checkbox" id="enable_back_to_last_tab" name="enable_back_to_last_tab" checked>
							<span class="slider round"></span>
						</label>
					</div>
					<p class="feature-description">Return to previous tab when closing current tab</p>
				</div>
				
				<!-- 功能3: 新标签页关闭器 -->
				<div class="feature-card">
					<div class="feature-header">
						<h2>New Tab Closer</h2>
						<label class="switch">
							<input type="checkbox" id="enable_new_tab_closer" name="enable_new_tab_closer" checked>
							<span class="slider round"></span>
						</label>
					</div>
					<p class="feature-description">Close empty tabs when switching to another tab</p>
				</div>
			</form>
		</main>
		
		<footer>
			<p>Tab Wrangler v0.1.0</p>
		</footer>
	</div>

	<script type="text/javascript" src="popup.js"></script>
</body>
</html>
